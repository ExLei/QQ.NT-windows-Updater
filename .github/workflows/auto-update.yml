name: QQ NT Version Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: qq-nt-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: Check and Update
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq dnsutils

      - name: Checkout this repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for new version
        id: check
        run: |
          set -euo pipefail

          git config --global --add safe.directory '*'

          CDN_URL="https://cdn-go.cn/qq-web/im.qq.com_new/latest/rainbow/windowsConfig.js"
          IP=$(dig +short cdn-go.cn.cloud.tc.qq.com A 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          CURL_ARGS=(-fsSL)
          if [[ -n "$IP" ]]; then
              CURL_ARGS+=(--resolve "cdn-go.cn:443:$IP")
              echo "Using resolved IP: $IP"
          fi
          CONTENT=$(curl "${CURL_ARGS[@]}" "$CDN_URL")

          JSON_STR=$(echo "$CONTENT" | sed -n 's/.*var params\s*=\s*\({.*}\)\s*;.*/\1/p')
          if [[ -z "$JSON_STR" ]]; then
              echo "::error::Failed to parse CDN config"
              exit 1
          fi

          # 提取三架构下载 URL
          X64_URL=$(echo "$JSON_STR" | jq -r '.ntDownloadX64Url')
          X86_URL=$(echo "$JSON_STR" | jq -r '.ntDownloadX86Url')
          ARM64_URL=$(echo "$JSON_STR" | jq -r '.ntDownloadArm64Url')

          if [[ -z "$X64_URL" || "$X64_URL" == "null" ]]; then
              echo "::error::No x64 download URL found"
              exit 1
          fi
          echo "x64 URL: $X64_URL"
          echo "x86 URL: ${X86_URL:-N/A}"
          echo "arm64 URL: ${ARM64_URL:-N/A}"

          if [[ "$X64_URL" =~ QQ_([0-9.]+)_([0-9]+)_x64_01\.exe ]]; then
              NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
              echo "::error::Failed to parse version from URL: $X64_URL"
              exit 1
          fi
          echo "Latest version: $NEW_VERSION"

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [[ -n "$LATEST_TAG" ]]; then
              CURRENT_VERSION="${LATEST_TAG#v}"
              echo "Current release version: $CURRENT_VERSION"
          else
              CURRENT_VERSION=""
              echo "No existing release found"
          fi

          if [[ "$NEW_VERSION" == "$CURRENT_VERSION" ]]; then
              echo "QQ NT is already up to date: $CURRENT_VERSION"
              echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
              echo "Update available: ${CURRENT_VERSION:-none} -> $NEW_VERSION"
              echo "needs_update=true" >> "$GITHUB_OUTPUT"
              echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "x64_url=$X64_URL" >> "$GITHUB_OUTPUT"
              echo "x86_url=$X86_URL" >> "$GITHUB_OUTPUT"
              echo "arm64_url=$ARM64_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Download installers and generate artifacts
        if: steps.check.outputs.needs_update == 'true'
        id: download
        run: |
          set -euo pipefail

          NEW_VERSION="${{ steps.check.outputs.new_version }}"
          X64_URL="${{ steps.check.outputs.x64_url }}"
          X86_URL="${{ steps.check.outputs.x86_url }}"
          ARM64_URL="${{ steps.check.outputs.arm64_url }}"

          mkdir -p build
          ARTIFACTS=()
          METADATA_ENTRIES=()

          # 定义架构列表
          declare -A ARCH_URLS=(
            ["x64"]="$X64_URL"
            ["x86"]="$X86_URL"
            ["arm64"]="$ARM64_URL"
          )

          for ARCH in x64 x86 arm64; do
            URL="${ARCH_URLS[$ARCH]}"
            if [[ -z "$URL" || "$URL" == "null" || "$URL" == "" ]]; then
              echo "Skipping $ARCH: no download URL available"
              continue
            fi

            INSTALLER_NAME="QQ_${NEW_VERSION}_${ARCH}.exe"
            INSTALLER_PATH="build/${INSTALLER_NAME}"

            echo "Downloading QQ NT $NEW_VERSION ($ARCH) ..."
            if ! curl -fsSL -o "$INSTALLER_PATH" "$URL"; then
              echo "::warning::Failed to download $ARCH installer, skipping"
              rm -f "$INSTALLER_PATH"
              continue
            fi

            FILE_SIZE=$(stat -c%s "$INSTALLER_PATH")
            SHA256=$(sha256sum "$INSTALLER_PATH" | awk '{print $1}')
            SHA1=$(sha1sum "$INSTALLER_PATH" | awk '{print $1}')
            MD5=$(md5sum "$INSTALLER_PATH" | awk '{print $1}')

            echo "$ARCH SHA256: $SHA256"

            echo "${SHA256}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.sha256"
            echo "${SHA1}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.sha1"
            echo "${MD5}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.md5"

            ARTIFACTS+=("${INSTALLER_PATH},${INSTALLER_PATH}.sha256,${INSTALLER_PATH}.sha1,${INSTALLER_PATH}.md5")

            LAST_MODIFIED=$(curl -fsSL -I "$URL" | grep -i '^last-modified:' | sed 's/^last-modified: //i' | tr -d '\r')

            METADATA_ENTRIES+=($(jq -n \
              --arg arch "$ARCH" \
              --arg url "$URL" \
              --arg sha256 "$SHA256" \
              --arg sha1 "$SHA1" \
              --arg md5 "$MD5" \
              --argjson size "$FILE_SIZE" \
              --arg last_modified "$LAST_MODIFIED" \
              --arg filename "$INSTALLER_NAME" \
              '{arch: $arch, url: $url, filename: $filename, size: $size, hashes: {sha256: $sha256, sha1: $sha1, md5: $md5}, last_modified: $last_modified}'))
          done

          # 生成 metadata.json
          jq -n \
            --arg version "$NEW_VERSION" \
            --argjson entries "$(printf '%s\n' "${METADATA_ENTRIES[@]}" | jq -s '.')" \
            '{version: $version, architectures: $entries}' > build/metadata.json

          # 生成 releaseNote.md
          cat > build/releaseNote.md << 'NOTEEOF'
          | Field | Value |
          |-------|-------|
          | Version | __VERSION__ |

          ## Architectures

          NOTEEOF

          sed -i "s|__VERSION__|${NEW_VERSION}|g" build/releaseNote.md

          # 为每个架构添加表格
          for ARCH in x64 x86 arm64; do
            URL="${ARCH_URLS[$ARCH]}"
            if [[ -z "$URL" || "$URL" == "null" || "$URL" == "" ]]; then
              continue
            fi
            INSTALLER_NAME="QQ_${NEW_VERSION}_${ARCH}.exe"
            INSTALLER_PATH="build/${INSTALLER_NAME}"
            if [[ ! -f "$INSTALLER_PATH" ]]; then
              continue
            fi
            FILE_SIZE=$(stat -c%s "$INSTALLER_PATH")
            SHA256=$(sha256sum "$INSTALLER_PATH" | awk '{print $1}')
            SHA1=$(sha1sum "$INSTALLER_PATH" | awk '{print $1}')
            MD5=$(md5sum "$INSTALLER_PATH" | awk '{print $1}')

            cat >> build/releaseNote.md << EOF
          ### ${ARCH}

          | Field | Value |
          |-------|-------|
          | Download URL | ${URL} |
          | File Size | $(( FILE_SIZE / 1024 / 1024 )) MB (${FILE_SIZE} bytes) |
          | SHA256 | ${SHA256} |
          | SHA1 | ${SHA1} |
          | MD5 | ${MD5} |

          ## Assets

          | File | Description |
          |------|-------------|
          | \`${INSTALLER_NAME}\` | QQ NT ${ARCH} 安装包 |
          | \`${INSTALLER_NAME}.sha256\` | SHA256 校验文件 |
          | \`${INSTALLER_NAME}.sha1\` | SHA1 校验文件 |
          | \`${INSTALLER_NAME}.md5\` | MD5 校验文件 |
          | \`metadata.json\` | 结构化元数据（JSON） |

          EOF
          done

          sed -i 's/^          //' build/releaseNote.md

          # 合并 artifacts 列表
          ALL_ARTIFACTS=$(IFS=,; echo "${ARTIFACTS[*]}" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "artifacts=$ALL_ARTIFACTS" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check.outputs.needs_update == 'true'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ steps.download.outputs.version }}
          name: QQ Windows Version ${{ steps.download.outputs.version }}
          artifacts: ${{ steps.download.outputs.artifacts }}
          bodyFile: build/releaseNote.md
          immutableCreate: true
          token: ${{ secrets.GITHUB_TOKEN }}
