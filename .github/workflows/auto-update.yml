name: QQ NT Version Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: qq-nt-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: Check and Update
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq dnsutils

      - name: Checkout this repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for new version
        id: check
        run: |
          set -euo pipefail

          git config --global --add safe.directory '*'

          CDN_URL="https://cdn-go.cn/qq-web/im.qq.com_new/latest/rainbow/windowsConfig.js"
          IP=$(dig +short cdn-go.cn.cloud.tc.qq.com A 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          CURL_ARGS=(-fsSL)
          if [[ -n "$IP" ]]; then
              CURL_ARGS+=(--resolve "cdn-go.cn:443:$IP")
              echo "Using resolved IP: $IP"
          fi
          CONTENT=$(curl "${CURL_ARGS[@]}" "$CDN_URL")

          JSON_STR=$(echo "$CONTENT" | sed -n 's/.*var params\s*=\s*\({.*}\)\s*;.*/\1/p')
          if [[ -z "$JSON_STR" ]]; then
              echo "::error::Failed to parse CDN config"
              exit 1
          fi

          DOWNLOAD_URL=$(echo "$JSON_STR" | jq -r '.ntDownloadX64Url')
          if [[ -z "$DOWNLOAD_URL" || "$DOWNLOAD_URL" == "null" ]]; then
              echo "::error::No x64 download URL found"
              exit 1
          fi
          echo "Latest download URL: $DOWNLOAD_URL"

          if [[ "$DOWNLOAD_URL" =~ QQ_([0-9.]+)_([0-9]+)_x64_01\.exe ]]; then
              NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
              echo "::error::Failed to parse version from URL: $DOWNLOAD_URL"
              exit 1
          fi
          echo "Latest version: $NEW_VERSION"

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [[ -n "$LATEST_TAG" ]]; then
              CURRENT_VERSION="${LATEST_TAG#v}"
              echo "Current release version: $CURRENT_VERSION"
          else
              CURRENT_VERSION=""
              echo "No existing release found"
          fi

          if [[ "$NEW_VERSION" == "$CURRENT_VERSION" ]]; then
              echo "QQ NT is already up to date: $CURRENT_VERSION"
              echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
              echo "Update available: ${CURRENT_VERSION:-none} -> $NEW_VERSION"
              echo "needs_update=true" >> "$GITHUB_OUTPUT"
              echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Download installer and generate artifacts
        if: steps.check.outputs.needs_update == 'true'
        id: download
        run: |
          set -euo pipefail

          NEW_VERSION="${{ steps.check.outputs.new_version }}"
          DOWNLOAD_URL="${{ steps.check.outputs.download_url }}"

          mkdir -p build
          INSTALLER_NAME="QQ_${NEW_VERSION}_x64.exe"
          INSTALLER_PATH="build/${INSTALLER_NAME}"

          echo "Downloading QQ NT $NEW_VERSION ..."
          curl -fsSL -o "$INSTALLER_PATH" "$DOWNLOAD_URL"

          FILE_SIZE=$(stat -c%s "$INSTALLER_PATH")

          SHA256=$(sha256sum "$INSTALLER_PATH" | awk '{print $1}')
          SHA1=$(sha1sum "$INSTALLER_PATH" | awk '{print $1}')
          MD5=$(md5sum "$INSTALLER_PATH" | awk '{print $1}')

          echo "SHA256: $SHA256"
          echo "SHA1:   $SHA1"
          echo "MD5:    $MD5"

          echo "${SHA256}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.sha256"
          echo "${SHA1}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.sha1"
          echo "${MD5}  ${INSTALLER_NAME}" > "${INSTALLER_PATH}.md5"

          LAST_MODIFIED=$(curl -fsSL -I "$DOWNLOAD_URL" | grep -i '^last-modified:' | sed 's/^last-modified: //i' | tr -d '\r')

          jq -n \
            --arg version "$NEW_VERSION" \
            --arg url "$DOWNLOAD_URL" \
            --arg sha256 "$SHA256" \
            --arg sha1 "$SHA1" \
            --arg md5 "$MD5" \
            --argjson size "$FILE_SIZE" \
            --arg last_modified "$LAST_MODIFIED" \
            --arg filename "$INSTALLER_NAME" \
            '{
              version: $version,
              url: $url,
              filename: $filename,
              size: $size,
              hashes: {
                sha256: $sha256,
                sha1: $sha1,
                md5: $md5
              },
              last_modified: $last_modified
            }' > build/metadata.json

          cat > build/releaseNote.md << 'NOTEEOF'
          | Field | Value |
          |-------|-------|
          | Version | __VERSION__ |
          | Download URL | __URL__ |
          | File Size | __SIZE__ |
          | Last Modified | __LASTMOD__ |

          ## Hashes

          | Algorithm | Value |
          |-----------|-------|
          | SHA256 | __SHA256__ |
          | SHA1 | __SHA1__ |
          | MD5 | __MD5__ |

          ## Assets

          | File | Description |
          |------|-------------|
          | `__FILENAME__` | QQ NT 安装包 |
          | `__FILENAME__.sha256` | SHA256 校验文件 |
          | `__FILENAME__.sha1` | SHA1 校验文件 |
          | `__FILENAME__.md5` | MD5 校验文件 |
          | `metadata.json` | 结构化元数据（JSON） |
          NOTEEOF

          sed -i "s|__VERSION__|${NEW_VERSION}|g" build/releaseNote.md
          sed -i "s|__URL__|${DOWNLOAD_URL}|g" build/releaseNote.md
          sed -i "s|__SHA256__|${SHA256}|g" build/releaseNote.md
          sed -i "s|__SHA1__|${SHA1}|g" build/releaseNote.md
          sed -i "s|__MD5__|${MD5}|g" build/releaseNote.md
          sed -i "s|__SIZE__|$(( FILE_SIZE / 1024 / 1024 )) MB (${FILE_SIZE} bytes)|g" build/releaseNote.md
          sed -i "s|__LASTMOD__|${LAST_MODIFIED}|g" build/releaseNote.md
          sed -i "s|__FILENAME__|${INSTALLER_NAME}|g" build/releaseNote.md
          sed -i 's/^          //' build/releaseNote.md

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "installer_path=$INSTALLER_PATH" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check.outputs.needs_update == 'true'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ steps.download.outputs.version }}
          name: QQ Windows Version ${{ steps.download.outputs.version }}
          artifacts: build/QQ_${{ steps.download.outputs.version }}_x64.exe,build/QQ_${{ steps.download.outputs.version }}_x64.exe.sha256,build/QQ_${{ steps.download.outputs.version }}_x64.exe.sha1,build/QQ_${{ steps.download.outputs.version }}_x64.exe.md5,build/metadata.json
          bodyFile: build/releaseNote.md
          immutableCreate: true
          token: ${{ secrets.GITHUB_TOKEN }}
